---
- name: Install encfs for {{ ansible_facts.distribution }}
  ansible.builtin.include_tasks: "{{ ansible_facts.distribution }}/main.yml"


- name: Make sure .config/autostart exists
  ansible.builtin.file:
    path: "{{ home }}/.config/autostart"
    state: directory
    mode: "0750"


- name: Create startup file
  ansible.builtin.copy:
    dest: "{{ home }}/.config/autostart/sirikali.desktop"
    content: |
      [Desktop Entry]
      Type=Application
      Exec=/usr/bin/sirikali
      Hidden=false
      NoDisplay=false
      X-GNOME-Autostart-enabled=true
      Name[en_US]=GoCryptFs
      Name=GoCryptFs
      Comment[en_US]=
      Comment=
    backup: true
    mode: "0640"

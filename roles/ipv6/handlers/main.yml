---
- name: Update grub configuration
  ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
  become: true
  changed_when: true
  listen: Update grub


- name: Restart systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted
  listen: Restart systemd-resolve
  become: true

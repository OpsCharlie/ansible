---
- name: Install git
  ansible.builtin.package:
    name:
      - git
      - zsh
#      - zsh-completions
    state: present
  become: true


- name: Download zsh from git
  ansible.builtin.git:
    repo: "git@github.com:OpsCharlie/zsh.git"
    dest: '{{ home }}/{{ git }}/zsh'
    accept_hostkey: true
  register: git_out


- name: Install lxc completion
  ansible.builtin.copy:
    dest: /usr/share/bash-completion/completions/lxc.zsh
    src: lxc.zsh
    mode: '0644'
  become: true


- name: Deploy zsh config
  ansible.builtin.command: 'bash {{ home }}/{{ git }}/zsh/__deploy.sh'
  changed_when: true
  when: git_out.changed

---
- name: Install git
  ansible.builtin.apt:
    name:
      - git
      - zsh
    state: present
  become: true


- name: Download zsh from git
  ansible.builtin.git:
    repo: "git@github.com:OpsCharlie/zsh.git"
    dest: '{{ git_dir }}/zsh'
    accept_hostkey: true
  notify: Deploy zsh config


- name: Install lxc completion
  ansible.builtin.copy:
    dest: /usr/share/bash-completion/completions/lxc.zsh
    src: lxc.zsh
    mode: '0644'
  become: true



---
- name: Install dependencies for {{ ansible_facts.distribution }}
  ansible.builtin.include_tasks: "{{ ansible_facts.distribution }}/main.yml"


- name: Download bashrc from git
  ansible.builtin.git:
    repo: "git@github.com:OpsCharlie/bash.git"
    dest: '{{ home }}/{{ git }}/bash'
    accept_hostkey: true
  register: git_out


- name: Deploy bash config
  ansible.builtin.command: 'bash {{ home }}/{{ git }}/bash/__deploy.sh'
  changed_when: false
  when: git_out.changed


- name: Copy bash theme
  ansible.builtin.copy:
    src: base16-railscasts.dark.sh
    dest: '{{ home }}/Downloads'
    mode: "0644"
  register: theme


- name: Run bash theme
  ansible.builtin.command: 'bash {{ home }}/Downloads/base16-railscasts.dark.sh'
  when: theme.changed

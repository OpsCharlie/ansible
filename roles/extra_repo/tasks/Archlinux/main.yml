---
- name: Archlinux | Install base-devel and git for AUR
  community.general.pacman:
    name:
      - base-devel
      - git
      - go
    state: present
  become: true


- name: Archlinux | Clone yay AUR repository
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: "{{ home }}/{{ git }}/yay"
    version: HEAD
    update: false


- name: Archlinux | Check if yay package already built
  ansible.builtin.find:
    paths: "{{ home }}/{{ git }}/yay"
    patterns: "yay-*.pkg.tar.*"
  register: yay_pkg
  changed_when: false


- name: Archlinux | Build yay package
  ansible.builtin.command: makepkg -s --noconfirm
  args:
    chdir: "{{ home }}/{{ git }}/yay"
  changed_when: true
  when: yay_pkg.matched == 0


- name: Archlinux | Check if yay is installed
  ansible.builtin.command: pacman -Qi yay
  register: yay_installed
  changed_when: false
  failed_when: false


- name: Archlinux | Install yay via pacman
  ansible.builtin.shell: pacman -U --noconfirm *.pkg.tar.zst
  args:
    chdir: "{{ home }}/{{ git }}/yay"
  become: true
  changed_when: true
  when: yay_installed.rc != 0


- name: Archlinux | Install flatpak
  ansible.builtin.package:
    name: flatpak
    state: present
  become: true
  when: packaging_archlinux_flatpak


- name: Archlinux | Add Flathub repository
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
    state: present
  become: true
  when: packaging_archlinux_flatpak

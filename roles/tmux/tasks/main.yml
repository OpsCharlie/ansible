---
- name: Install
  ansible.builtin.apt:
    name:
      - tmux
      - xsel
    state: present
  become: true


- name: Create {{ home }}/{{ git }} directory
  ansible.builtin.file:
    path: "{{ home }}/{{ git }}"
    state: directory
    mode: "0755"


- name: Download tmuxrc from git
  ansible.builtin.git:
    repo: "git@github.com:OpsCharlie/tmux.git"
    dest: "{{ home }}/{{ git }}/tmux"
    accept_hostkey: true


- name: Deploy tmux config
  ansible.builtin.command: "{{ home }}/{{ git }}/tmux/__deploy.sh"
  changed_when: true

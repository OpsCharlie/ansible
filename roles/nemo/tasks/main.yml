- name: Install nemo for {{ ansible_facts.distribution }}
  ansible.builtin.include_tasks: "{{ ansible_facts.distribution }}/main.yml"


- name: Set nemo as default file manager
  ansible.builtin.command: xdg-mime default nemo.desktop {{ item }}
  loop:
    - inode/directory
    - application/x-gnome-saved-search
  changed_when: false

# To revert to Nautilus:
#   xdg-mime default nautilus.desktop inode/directory
#   xdg-mime default nautilus.desktop application/x-gnome-saved-search
